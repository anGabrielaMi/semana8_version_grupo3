{% extends 'hotelreef/base.html' %}
{% load static %}

{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
    <div style="text-align: center; padding: 40px 20px;">

        <img src="{% static 'img/usr.png' %}" alt="user" height="100" style="margin-bottom: 20px;">
        <h1>Iniciar Sesión</h1>

        {% if error %}
            <p style="color: red;">{{ error }}</p>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}

            <label for="correo">Correo electrónico:</label><br>
            <input type="email" id="correo" name="correo_electronico" required><br><br>

            <label for="clave">Contraseña:</label><br>
            <input type="password" id="clave" name="contraseña" required><br><br>

            <button type="submit" class="btn-primario">Iniciar Sesión</button>
        </form>

        <p style="margin-top: 20px;">
            ¿No tienes cuenta? <a href="{% url 'registrar' %}">Regístrate aquí</a>
        </p>
        <p>
            <a href="{% url 'recuperar_psswd' %}">¿Olvidaste tu contraseña?</a>
        </p>

    </div>
{% endblock %}
